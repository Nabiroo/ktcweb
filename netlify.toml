[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/staff-portal"
  to = "/staff-portal.html"
  status = 200
  force = true
  conditions = { Role = ["staff", "admin"] }

[[redirects]]
  from = "/staff-portal"
  to = "/staff-login.html"
  status = 401
  force = true

[[redirects]]
  from = "/staff-portal.html"
  to = "/staff-portal.html"
  status = 200
  force = true
  conditions = { Role = ["staff", "admin"] }

[[redirects]]
  from = "/staff-portal.html"
  to = "/staff-login.html"
  status = 401
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200
  force = true
  conditions = { Role = ["admin"] }

[[redirects]]
  from = "/admin-dashboard"
  to = "/admin-dashboard.html"
  status = 200
  force = true
  conditions = { Role = ["admin"] }

[[redirects]]
  from = "/admin-dashboard"
  to = "/staff-login.html"
  status = 401
  force = true

[[redirects]]
  from = "/admin"
  to = "/staff-login.html"
  status = 401
  force = true

[[redirects]]
  from = "/admin-dashboard.html"
  to = "/admin-dashboard.html"
  status = 200
  force = true
  conditions = { Role = ["admin"] }

[[redirects]]
  from = "/admin.html"
  to = "/admin.html"
  status = 200
  force = true
  conditions = { Role = ["admin"] }

[[redirects]]
  from = "/admin.html"
  to = "/staff-login.html"
  status = 401
  force = true

[[redirects]]
  from = "/admin-dashboard.html"
  to = "/staff-login.html"
  status = 401
  force = true

# Protect staff portal and admin pages — redirect to login if no valid JWT
[[headers]]
  for = "/staff-portal.html"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/admin-dashboard.html"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*"
  [headers.values]
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/.well-known/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=300"
